# ────────────────────────────────────────────────────────────────────
# AgentFleetControl — 本地实验环境
#
# 启动后你会得到：
#   - 1 个管控端（API + 前端）
#   - 3 个员工容器（每个都是完整的"员工电脑"，可 exec 进去使用）
#
# 使用：
#   docker compose up -d --build
#   docker exec -it afc-employee-alice bash   # 进入员工 A 的电脑
# ────────────────────────────────────────────────────────────────────

services:
  # ── 基础设施 ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: afc-postgres
    environment:
      POSTGRES_USER: afc
      POSTGRES_PASSWORD: afc
      POSTGRES_DB: afc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: afc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── 管控端 API ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afc-api
    environment:
      DATABASE_URL: postgresql+asyncpg://afc:afc@postgres:5432/afc
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: afc-demo-secret-key-not-for-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      DEBUG: "false"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── 员工 Alice ────────────────────────────────────────────────
  employee-alice:
    build:
      context: .
      dockerfile: docker/employee/Dockerfile
    container_name: afc-employee-alice
    environment:
      AFC_CONTROL_CENTER_URL: http://api:8000
      AFC_ENROLLMENT_TOKEN: afcet_demo-token-for-local-dev-0000000000
      AFC_DEVICE_ID: afc-dev-alice-001
      AFC_HOSTNAME: alice-macbook
      AFC_USERNAME: alice
      AFC_OS: macOS
      # ── OpenClaw 配置（可选，取消注释并填入你的 API Key）──
      # OPENCLAW_PROVIDER: openrouter
      # OPENCLAW_API_KEY: sk-or-...
      # OPENCLAW_MODEL: openrouter/anthropic/claude-sonnet-4
      # OPENCLAW_BASE_URL: https://your-custom-api.com/v1   # 仅自定义平台需要
    depends_on:
      - api
    stdin_open: true    # docker exec 需要
    tty: true           # docker exec 需要
    volumes:
      - ./data/alice-openclaw:/root/.openclaw
      - ./data/alice-afc:/root/.afc

  # ── 员工 Bob ──────────────────────────────────────────────────
  employee-bob:
    build:
      context: .
      dockerfile: docker/employee/Dockerfile
    container_name: afc-employee-bob
    environment:
      AFC_CONTROL_CENTER_URL: http://api:8000
      AFC_ENROLLMENT_TOKEN: afcet_demo-token-for-local-dev-0000000000
      AFC_DEVICE_ID: afc-dev-bob-001
      AFC_HOSTNAME: bob-thinkpad
      AFC_USERNAME: bob
      AFC_OS: Linux
      # ── OpenClaw 配置（可选，取消注释并填入你的 API Key）──
      # OPENCLAW_PROVIDER: openrouter
      # OPENCLAW_API_KEY: sk-or-...
      # OPENCLAW_MODEL: openrouter/anthropic/claude-sonnet-4
      # OPENCLAW_BASE_URL: https://your-custom-api.com/v1
    depends_on:
      - api
    stdin_open: true
    tty: true
    volumes:
      - ./data/bob-openclaw:/root/.openclaw
      - ./data/bob-afc:/root/.afc

  # ── 员工 Carol ────────────────────────────────────────────────
  employee-carol:
    build:
      context: .
      dockerfile: docker/employee/Dockerfile
    container_name: afc-employee-carol
    environment:
      AFC_CONTROL_CENTER_URL: http://api:8000
      AFC_ENROLLMENT_TOKEN: afcet_demo-token-for-local-dev-0000000000
      AFC_DEVICE_ID: afc-dev-carol-001
      AFC_HOSTNAME: carol-desktop
      AFC_USERNAME: carol
      AFC_OS: Windows
      # ── OpenClaw 配置（可选，取消注释并填入你的 API Key）──
      # OPENCLAW_PROVIDER: openrouter
      # OPENCLAW_API_KEY: sk-or-...
      # OPENCLAW_MODEL: openrouter/anthropic/claude-sonnet-4
      # OPENCLAW_BASE_URL: https://your-custom-api.com/v1
    depends_on:
      - api
    stdin_open: true
    tty: true
    volumes:
      - ./data/carol-openclaw:/root/.openclaw
      - ./data/carol-afc:/root/.afc

volumes:
  pgdata:
